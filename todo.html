<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Do</title>
<meta name="theme-color" content="#4A6B57">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="To Do">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F5F0E8;--warm-white:#FDFAF5;
  --sage:#7C9E8A;--sage-light:#A8C4B4;--sage-dark:#4A6B57;
  --terracotta:#C4714A;--terracotta-light:#E8A882;
  --amber:#C48A1A;--amber-light:#F0D080;
  --charcoal:#2C2C2C;--mid-gray:#6B6B6B;--light-gray:#E0DAD0;
  --shadow:rgba(44,44,44,.08);--shadow-md:rgba(44,44,44,.14);
  --prio-high:#C4714A;--prio-medium:#C48A1A;--prio-low:#5A8A4A;--prio-none:#AAAAAA;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--cream);color:var(--charcoal);min-height:100vh;}

/* ── HEADER ── */
header{background:var(--sage-dark);color:white;padding:12px 22px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px var(--shadow-md);position:sticky;top:0;z-index:50;gap:10px;flex-wrap:wrap;}
.header-left{display:flex;align-items:center;gap:10px;}
.header-left h1{font-family:'DM Serif Display',Georgia,serif;font-size:1.4rem;letter-spacing:-.01em;}
.header-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
.hdr-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:white;padding:6px 12px;border-radius:22px;cursor:pointer;font-family:inherit;font-size:.74rem;font-weight:500;transition:all .2s;display:flex;align-items:center;gap:5px;white-space:nowrap;text-decoration:none;}
.hdr-btn:hover{background:rgba(255,255,255,.28);}
.hdr-btn.primary{background:var(--terracotta);border-color:var(--terracotta);}
.hdr-btn.primary:hover{background:#b5623d;}

/* ── PROJECT SELECTOR ── */
.proj-selector{position:relative;}
.proj-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--warm-white);border-radius:12px;box-shadow:0 6px 24px rgba(44,44,44,.18);min-width:220px;z-index:300;padding:8px;display:none;}
.proj-dropdown.open{display:block;}
.proj-dd-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:.83rem;color:var(--charcoal);transition:background .15s;}
.proj-dd-item:hover{background:var(--cream);}
.proj-dd-item.current{font-weight:600;background:var(--cream);}
.proj-dd-item.all-item{color:var(--mid-gray);}
.proj-divider{height:1px;background:var(--light-gray);margin:4px 0;}
.proj-new-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:.83rem;color:var(--sage-dark);font-weight:500;border:none;background:none;width:100%;font-family:inherit;transition:background .15s;}
.proj-new-btn:hover{background:var(--cream);}
.proj-edit-btn{background:none;border:none;cursor:pointer;color:var(--mid-gray);font-size:.78rem;padding:2px 5px;border-radius:4px;opacity:0;transition:opacity .1s;margin-left:auto;flex-shrink:0;}
.proj-dd-item:hover .proj-edit-btn{opacity:.6;}
.proj-edit-btn:hover{opacity:1!important;}

/* ── LAYOUT ── */
.app{display:grid;grid-template-columns:245px 1fr;height:calc(100vh - 58px);}

/* ── SIDEBAR ── */
.sidebar{background:var(--warm-white);border-right:1px solid var(--light-gray);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px;}
.section-title{font-family:'DM Serif Display',Georgia,serif;font-size:.9rem;color:var(--sage-dark);margin-bottom:7px;}
.sidebar-proj-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;cursor:pointer;font-size:.82rem;transition:background .15s;position:relative;}
.sidebar-proj-item:hover{background:var(--cream);}
.sidebar-proj-item.active{background:var(--cream);font-weight:600;}
.proj-count{margin-left:auto;font-size:.68rem;color:var(--mid-gray);background:var(--light-gray);padding:1px 6px;border-radius:10px;flex-shrink:0;}
.proj-count.overdue{background:#FCEAE4;color:var(--terracotta);}
.sidebar-proj-edit{background:none;border:none;cursor:pointer;color:var(--mid-gray);font-size:.75rem;padding:1px 4px;opacity:0;transition:opacity .1s;border-radius:3px;}
.sidebar-proj-item:hover .sidebar-proj-edit{opacity:.6;}
.sidebar-proj-edit:hover{opacity:1!important;}
.sidebar-new-btn{background:none;border:1px dashed var(--light-gray);border-radius:7px;padding:7px;cursor:pointer;font-family:inherit;font-size:.8rem;color:var(--sage-dark);transition:all .15s;width:100%;text-align:center;}
.sidebar-new-btn:hover{background:var(--cream);border-color:var(--sage);}
.filter-list{display:flex;flex-direction:column;gap:2px;}
.filter-item{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:7px;cursor:pointer;font-size:.82rem;transition:background .15s;}
.filter-item:hover{background:var(--cream);}
.filter-item.active{background:var(--cream);font-weight:600;}
.filter-item-count{margin-left:auto;font-size:.68rem;color:var(--mid-gray);background:var(--light-gray);padding:1px 6px;border-radius:10px;}
.filter-item-count.red{background:#FCEAE4;color:var(--terracotta);}
.stats-block{background:var(--cream);border-radius:10px;padding:11px 12px;display:flex;flex-direction:column;gap:6px;}
.stat-row{display:flex;justify-content:space-between;align-items:center;font-size:.78rem;}
.stat-num{font-weight:700;font-size:.95rem;}
.stat-num.green{color:var(--sage-dark);}
.stat-num.red{color:var(--terracotta);}

/* ── MAIN ── */
.main{overflow-y:auto;padding:20px 24px;}
.main-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:10px;flex-wrap:wrap;}
.main-header h2{font-family:'DM Serif Display',Georgia,serif;font-size:1.3rem;}
.view-toggle{display:flex;background:var(--warm-white);border-radius:7px;padding:3px;gap:2px;border:1px solid var(--light-gray);}
.view-btn{background:none;border:none;padding:5px 12px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:.74rem;font-weight:500;color:var(--mid-gray);transition:all .15s;white-space:nowrap;}
.view-btn.active{background:var(--sage-dark);color:white;}
.add-task-btn{background:var(--sage-dark);color:white;border:none;padding:7px 16px;border-radius:22px;cursor:pointer;font-family:inherit;font-size:.8rem;font-weight:600;transition:background .2s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.add-task-btn:hover{background:var(--sage);}

/* ── TASK GROUPS ── */
.group-section{margin-bottom:22px;}
.group-header{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding-bottom:5px;margin-bottom:8px;border-bottom:2px solid;display:flex;align-items:center;gap:8px;}
.group-header.overdue{color:var(--terracotta);border-color:#FCEAE4;}
.group-header.today{color:var(--sage-dark);border-color:var(--sage-light);}
.group-header.tomorrow{color:var(--amber);border-color:var(--amber-light);}
.group-header.week{color:var(--charcoal);border-color:var(--light-gray);}
.group-header.later,.group-header.none{color:var(--mid-gray);border-color:var(--light-gray);}
.group-count{font-size:.66rem;background:var(--light-gray);padding:1px 7px;border-radius:10px;font-weight:400;}

/* ── TASK CARD ── */
.task-card{background:var(--warm-white);border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:flex-start;gap:11px;border:1px solid var(--light-gray);transition:box-shadow .15s;cursor:pointer;}
.task-card:hover{box-shadow:0 2px 10px var(--shadow);}
.task-card.done-card{opacity:.45;}
.task-card.overdue-card{border-left:3px solid var(--terracotta);}
.task-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--light-gray);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:white;transition:all .2s;cursor:pointer;margin-top:1px;}
.task-check:hover{border-color:var(--sage);}
.task-card.done-card .task-check{background:var(--sage);border-color:var(--sage);}
.prio-strip{width:3px;height:100%;border-radius:99px;align-self:stretch;flex-shrink:0;min-height:18px;}
.task-body{flex:1;min-width:0;}
.task-title{font-size:.87rem;font-weight:500;line-height:1.35;}
.task-card.done-card .task-title{text-decoration:line-through;}
.task-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px;}
.deadline-badge{font-size:.68rem;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap;}
.deadline-badge.overdue{background:#FCEAE4;color:var(--terracotta);}
.deadline-badge.today{background:#E4F0EA;color:var(--sage-dark);}
.deadline-badge.tomorrow{background:#FEF6D0;color:var(--amber);}
.deadline-badge.normal{background:var(--cream);color:var(--mid-gray);}
.proj-badge{font-size:.68rem;padding:2px 8px;border-radius:10px;background:var(--cream);color:var(--mid-gray);white-space:nowrap;}
.task-notes{font-size:.72rem;color:var(--mid-gray);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic;}
.task-del-btn{background:none;border:none;color:var(--mid-gray);cursor:pointer;font-size:.9rem;padding:3px 5px;border-radius:4px;opacity:0;transition:opacity .1s;flex-shrink:0;}
.task-card:hover .task-del-btn{opacity:.35;}
.task-del-btn:hover{opacity:1!important;color:var(--terracotta);}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--mid-gray);}
.empty-state .empty-icon{font-size:3.5rem;margin-bottom:14px;}
.empty-state p{font-size:.9rem;line-height:1.6;margin-bottom:20px;}
.empty-state button{background:var(--sage-dark);color:white;border:none;padding:10px 22px;border-radius:22px;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:600;transition:background .2s;}
.empty-state button:hover{background:var(--sage);}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(44,44,44,.48);display:none;align-items:center;justify-content:center;z-index:200;padding:16px;}
.modal-overlay.open{display:flex;}
.modal-card{background:var(--warm-white);border-radius:16px;width:100%;max-width:470px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(44,44,44,.22);}
.modal-top{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 0;}
.modal-top h3{font-family:'DM Serif Display',Georgia,serif;font-size:1.1rem;}
.modal-close{background:var(--light-gray);border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;color:var(--mid-gray);transition:background .15s;flex-shrink:0;}
.modal-close:hover{background:var(--terracotta-light);}
.modal-body{padding:14px 18px;display:flex;flex-direction:column;gap:11px;}
.form-row{display:flex;flex-direction:column;gap:4px;}
.form-row label{font-size:.64rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--mid-gray);}
.form-row input,.form-row select,.form-row textarea{background:var(--cream);border:1px solid var(--light-gray);border-radius:7px;padding:8px 10px;font-family:inherit;font-size:.82rem;color:var(--charcoal);outline:none;transition:border-color .15s;}
.form-row textarea{min-height:60px;resize:vertical;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--sage);}
.form-row-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.prio-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:2px;}
.prio-btn{border:2px solid var(--light-gray);border-radius:7px;padding:7px 4px;cursor:pointer;font-family:inherit;font-size:.74rem;font-weight:500;transition:all .15s;text-align:center;background:var(--cream);}
.prio-btn:hover{filter:brightness(.95);}
.prio-btn[data-prio="none"].selected{border-color:var(--prio-none);background:#F0F0F0;color:var(--mid-gray);}
.prio-btn[data-prio="low"].selected{border-color:var(--prio-low);background:#EAF2EA;color:var(--prio-low);}
.prio-btn[data-prio="medium"].selected{border-color:var(--prio-medium);background:#FEF6D0;color:var(--prio-medium);}
.prio-btn[data-prio="high"].selected{border-color:var(--prio-high);background:#FCEAE4;color:var(--prio-high);}
.done-toggle-row{display:flex;align-items:center;gap:9px;padding:7px 9px;background:var(--cream);border-radius:7px;cursor:pointer;font-size:.82rem;font-weight:500;user-select:none;}
.done-toggle-row input{width:14px;height:14px;accent-color:var(--sage);cursor:pointer;}
.modal-footer{display:flex;gap:7px;padding:0 18px 16px;}
.btn-danger{background:none;border:1px solid var(--terracotta-light);color:var(--terracotta);padding:8px 12px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:600;transition:all .2s;}
.btn-danger:hover{background:var(--terracotta);color:white;}
.btn-save{flex:1;background:var(--sage-dark);color:white;border:none;padding:8px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;transition:background .2s;}
.btn-save:hover{background:var(--sage);}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-top:4px;}
.emoji-btn{background:none;border:2px solid transparent;border-radius:7px;padding:4px;cursor:pointer;font-size:1.2rem;transition:all .15s;text-align:center;}
.emoji-btn:hover{background:var(--cream);}
.emoji-btn.selected{border-color:var(--sage-dark);background:var(--cream);}

/* ── FAB ── */
.mobile-fab{display:none;position:fixed;bottom:20px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--sage-dark);color:white;border:none;font-size:1.7rem;cursor:pointer;box-shadow:0 4px 16px rgba(44,44,44,.24);z-index:100;align-items:center;justify-content:center;transition:background .2s;}
.mobile-fab:hover{background:var(--sage);}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;right:20px;background:var(--charcoal);color:white;padding:10px 16px;border-radius:10px;font-size:.8rem;opacity:0;transform:translateY(8px);transition:all .25s;z-index:999;max-width:290px;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0);}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--light-gray);border-radius:10px;}

@media(max-width:768px){
  .app{grid-template-columns:1fr;height:auto;}
  .sidebar{display:none;}
  .main{padding:12px;}
  .mobile-fab{display:flex;}
  #toast{bottom:82px;right:12px;}
  header{padding:10px 14px;}
  .header-left h1{font-size:1.1rem;}
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="index.html" class="hdr-btn">🏡 Thuis</a>
    <h1>✅ To Do</h1>
  </div>
  <div class="header-right">
    <div class="proj-selector" id="projSelector">
      <button class="hdr-btn" onclick="toggleProjDropdown(event)">
        <span id="currentProjIcon">📝</span>
        <span id="currentProjName">Laden…</span>
        <span>▾</span>
      </button>
      <div class="proj-dropdown" id="projDropdown">
        <div id="projDropdownItems"></div>
        <div class="proj-divider"></div>
        <button class="proj-new-btn" onclick="openProjModal(null)">＋ Nieuw project</button>
      </div>
    </div>
    <button class="hdr-btn primary" onclick="openTaskModal(null)">＋ Taak</button>
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <div>
      <div class="section-title">Projecten</div>
      <div id="sidebarProjects"></div>
      <button class="sidebar-new-btn" onclick="openProjModal(null)" style="margin-top:6px">＋ Nieuw project</button>
    </div>
    <div>
      <div class="section-title">Filter</div>
      <div class="filter-list" id="filterList">
        <div class="filter-item active" data-filter="active" onclick="setFilter('active',this)"><span>▶ Actief</span><span class="filter-item-count" id="fc-active">0</span></div>
        <div class="filter-item" data-filter="overdue" onclick="setFilter('overdue',this)"><span>⚠ Verlopen</span><span class="filter-item-count red" id="fc-overdue">0</span></div>
        <div class="filter-item" data-filter="today" onclick="setFilter('today',this)"><span>☀ Vandaag</span><span class="filter-item-count" id="fc-today">0</span></div>
        <div class="filter-item" data-filter="all" onclick="setFilter('all',this)"><span>≡ Alle taken</span><span class="filter-item-count" id="fc-all">0</span></div>
        <div class="filter-item" data-filter="done" onclick="setFilter('done',this)"><span>✓ Afgerond</span><span class="filter-item-count" id="fc-done">0</span></div>
      </div>
    </div>
    <div>
      <div class="section-title">Statistieken</div>
      <div class="stats-block">
        <div class="stat-row"><span>Open taken</span><span class="stat-num" id="statOpen">0</span></div>
        <div class="stat-row"><span>Verlopen</span><span class="stat-num red" id="statOverdue">0</span></div>
        <div class="stat-row"><span>Afgerond vandaag</span><span class="stat-num green" id="statDoneToday">0</span></div>
        <div class="stat-row"><span>Afgerond totaal</span><span class="stat-num green" id="statDoneAll">0</span></div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <h2 id="mainHeading">Actieve taken</h2>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <div class="view-toggle">
          <button class="view-btn active" data-view="deadline" onclick="setView('deadline',this)">Deadline</button>
          <button class="view-btn" data-view="priority" onclick="setView('priority',this)">Prioriteit</button>
          <button class="view-btn" data-view="project" onclick="setView('project',this)">Project</button>
        </div>
        <button class="add-task-btn" onclick="openTaskModal(null)">＋ Taak toevoegen</button>
      </div>
    </div>
    <div id="taskContainer"></div>
  </main>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="taskModal" onclick="if(event.target===this)closeTaskModal()">
  <div class="modal-card">
    <div class="modal-top">
      <h3 id="taskModalTitle">Taak toevoegen</h3>
      <button class="modal-close" onclick="closeTaskModal()">✕</button>
    </div>
    <div class="modal-body">
      <label class="done-toggle-row" id="doneToggleRow" style="display:none">
        <input type="checkbox" id="editDone"> <span>Afgerond</span>
      </label>
      <div class="form-row">
        <label>Titel *</label>
        <input type="text" id="editTitle" placeholder="Wat moet je doen?"/>
      </div>
      <div class="form-row">
        <label>Notities</label>
        <textarea id="editNotes" placeholder="Extra details, links, context…"></textarea>
      </div>
      <div class="form-row-grid">
        <div class="form-row">
          <label>Deadline</label>
          <input type="date" id="editDeadline"/>
        </div>
        <div class="form-row">
          <label>Tijd (optioneel)</label>
          <input type="time" id="editDeadlineTime"/>
        </div>
      </div>
      <div class="form-row">
        <label>Prioriteit</label>
        <div class="prio-grid">
          <button class="prio-btn selected" data-prio="none" onclick="selectPriority(this)">— Geen</button>
          <button class="prio-btn" data-prio="low" onclick="selectPriority(this)">↓ Laag</button>
          <button class="prio-btn" data-prio="medium" onclick="selectPriority(this)">→ Middel</button>
          <button class="prio-btn" data-prio="high" onclick="selectPriority(this)">↑ Hoog</button>
        </div>
      </div>
      <div class="form-row">
        <label>Project</label>
        <select id="editProject"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-danger" id="taskDeleteBtn" onclick="deleteTaskFromModal()" style="display:none">Verwijderen</button>
      <button class="btn-save" onclick="saveTask()">Opslaan</button>
    </div>
  </div>
</div>

<!-- PROJECT MODAL -->
<div class="modal-overlay" id="projModal" onclick="if(event.target===this)closeProjModal()">
  <div class="modal-card">
    <div class="modal-top">
      <h3 id="projModalTitle">Nieuw project</h3>
      <button class="modal-close" onclick="closeProjModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label>Naam *</label>
        <input type="text" id="projName" placeholder="bijv. Werk, Thuis, Studie…"/>
      </div>
      <div class="form-row">
        <label>Icoon</label>
        <div class="emoji-grid" id="projEmojiGrid"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-danger" id="projDeleteBtn" onclick="deleteCurrentProject()" style="display:none">Verwijderen</button>
      <button class="btn-save" onclick="saveProject()">Opslaan</button>
    </div>
  </div>
</div>

<button class="mobile-fab" onclick="openTaskModal(null)" title="Taak toevoegen">+</button>
<div id="toast"></div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────
const PROJ_EMOJIS = ['📝','💼','🏡','📚','🌿','⭐','❤️','🎯','🔧','🎨','🏋️','✈️','💡','🎵','📦','🌊'];
const PRIO_LABELS = {none:'Geen',low:'Laag',medium:'Middel',high:'Hoog'};
const PRIO_COLORS = {none:'var(--prio-none)',low:'var(--prio-low)',medium:'var(--prio-medium)',high:'var(--prio-high)'};
const PRIO_ORDER  = {high:0,medium:1,low:2,none:3};

const GROUP_CONFIG = {
  overdue:  { label:'Verlopen',       cls:'overdue',  icon:'⚠️' },
  today:    { label:'Vandaag',        cls:'today',    icon:'☀️' },
  tomorrow: { label:'Morgen',         cls:'tomorrow', icon:'🌅' },
  week:     { label:'Deze week',      cls:'week',     icon:'📅' },
  later:    { label:'Later',          cls:'later',    icon:'🗓' },
  none:     { label:'Geen deadline',  cls:'none',     icon:'∞' },
};
const DEADLINE_ORDER = ['overdue','today','tomorrow','week','later','none'];
const PRIO_GROUP_CONFIG = {
  high:   { label:'Hoge prioriteit',     cls:'overdue', icon:'↑' },
  medium: { label:'Gemiddelde prioriteit',cls:'tomorrow',icon:'→' },
  low:    { label:'Lage prioriteit',     cls:'week',    icon:'↓' },
  none:   { label:'Geen prioriteit',     cls:'none',    icon:'—' },
};

// ─── STATE ───────────────────────────────────────────────
let projects = JSON.parse(localStorage.getItem('td_projects') || 'null');
if(!projects){ projects=[{id:'persoonlijk',name:'Persoonlijk',icon:'📝'},{id:'werk',name:'Werk',icon:'💼'}]; localStorage.setItem('td_projects',JSON.stringify(projects)); }

let currentProjId = localStorage.getItem('td_current') || 'all';
let currentFilter = 'active';
let currentView   = 'deadline';
let editingTaskId = null;

function tasksKey(id){ return `td_tasks_${id}`; }
function loadAllTasks(){ let all=[]; projects.forEach(p=>{ JSON.parse(localStorage.getItem(tasksKey(p.id))||'[]').forEach(t=>all.push({...t,project:p.id})); }); return all; }
function saveTasks(pid, arr){ localStorage.setItem(tasksKey(pid), JSON.stringify(arr)); }
function getProjectTasks(pid){ return JSON.parse(localStorage.getItem(tasksKey(pid))||'[]'); }
function saveProjects(){ localStorage.setItem('td_projects',JSON.stringify(projects)); }

// ─── DATE HELPERS ────────────────────────────────────────
const todayStr = ()=>new Date().toISOString().split('T')[0];
function deadlineGroup(dl){
  if(!dl)return'none';
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(dl+'T00:00:00');
  if(d<today)return'overdue';
  const diff=Math.round((d-today)/86400000);
  if(diff===0)return'today';
  if(diff===1)return'tomorrow';
  if(diff<=6)return'week';
  return'later';
}
function fmtDeadline(dl,time){
  if(!dl)return'';
  const d=new Date(dl+'T00:00:00');
  const label=d.toLocaleDateString('nl-NL',{weekday:'short',day:'numeric',month:'short'});
  return time?label+' '+time:label;
}

// ─── PROJECT DROPDOWN ────────────────────────────────────
function toggleProjDropdown(e){ e&&e.stopPropagation(); const dd=document.getElementById('projDropdown'); dd.classList.toggle('open'); if(dd.classList.contains('open'))renderProjDropdown(); }
function closeProjDropdown(){ document.getElementById('projDropdown').classList.remove('open'); }
document.addEventListener('click',e=>{ if(!document.getElementById('projSelector').contains(e.target))closeProjDropdown(); });

function renderProjDropdown(){
  const all=getAllTasks();
  const allCnt=all.filter(t=>!t.done).length;
  let html=`<div class="proj-dd-item all-item ${currentProjId==='all'?'current':''}" onclick="switchProject('all')"><span>📋</span><span style="flex:1">Alle projecten</span><span style="background:var(--light-gray);padding:1px 6px;border-radius:10px;font-size:.68rem">${allCnt}</span></div><div class="proj-divider"></div>`;
  html+=projects.map(p=>{
    const cnt=getProjectTasks(p.id).filter(t=>!t.done).length;
    return`<div class="proj-dd-item ${p.id===currentProjId?'current':''}" onclick="switchProject('${p.id}')">
      <span>${p.icon}</span><span style="flex:1">${escHtml(p.name)}</span>
      ${cnt>0?`<span style="background:var(--light-gray);padding:1px 6px;border-radius:10px;font-size:.68rem">${cnt}</span>`:''}
      <button class="proj-edit-btn" onclick="event.stopPropagation();closeProjDropdown();openProjModal('${p.id}')">✎</button>
    </div>`;
  }).join('');
  document.getElementById('projDropdownItems').innerHTML=html;
}

function switchProject(id){
  currentProjId=id; localStorage.setItem('td_current',id); closeProjDropdown();
  updateProjHeader(); renderSidebar(); render();
}

function updateProjHeader(){
  if(currentProjId==='all'){
    document.getElementById('currentProjIcon').textContent='📋';
    document.getElementById('currentProjName').textContent='Alle projecten';
  }else{
    const p=projects.find(p=>p.id===currentProjId)||projects[0];
    document.getElementById('currentProjIcon').textContent=p.icon;
    document.getElementById('currentProjName').textContent=p.name;
  }
}

// ─── SIDEBAR ─────────────────────────────────────────────
function renderSidebar(){
  const all=getAllTasks();
  // Project list
  let html=`<div class="sidebar-proj-item ${currentProjId==='all'?'active':''}" onclick="switchProject('all')">
    <span>📋</span><span style="flex:1">Alle projecten</span>
    <span class="proj-count">${all.filter(t=>!t.done).length}</span>
  </div>`;
  html+=projects.map(p=>{
    const tasks=getProjectTasks(p.id);
    const open=tasks.filter(t=>!t.done).length;
    const ov=tasks.filter(t=>!t.done&&t.deadline&&t.deadline<todayStr()).length;
    return`<div class="sidebar-proj-item ${p.id===currentProjId?'active':''}" onclick="switchProject('${p.id}')">
      <span>${p.icon}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(p.name)}</span>
      ${ov>0?`<span class="proj-count overdue">${ov}</span>`:open>0?`<span class="proj-count">${open}</span>`:''}
      <button class="sidebar-proj-edit" onclick="event.stopPropagation();openProjModal('${p.id}')">✎</button>
    </div>`;
  }).join('');
  document.getElementById('sidebarProjects').innerHTML=html;

  // Filter counts
  const today=todayStr();
  document.getElementById('fc-all').textContent=all.length;
  document.getElementById('fc-active').textContent=all.filter(t=>!t.done).length;
  document.getElementById('fc-done').textContent=all.filter(t=>t.done).length;
  document.getElementById('fc-overdue').textContent=all.filter(t=>!t.done&&t.deadline&&t.deadline<today).length;
  document.getElementById('fc-today').textContent=all.filter(t=>!t.done&&t.deadline===today).length;

  // Stats
  const open=all.filter(t=>!t.done).length;
  const overdue=all.filter(t=>!t.done&&t.deadline&&t.deadline<today).length;
  const doneToday=all.filter(t=>t.done&&t.doneAt===today).length;
  const doneAll=all.filter(t=>t.done).length;
  document.getElementById('statOpen').textContent=open;
  document.getElementById('statOverdue').textContent=overdue;
  document.getElementById('statDoneToday').textContent=doneToday;
  document.getElementById('statDoneAll').textContent=doneAll;
}

// ─── GET TASKS ───────────────────────────────────────────
function getAllTasks(){
  const all=[];
  projects.forEach(p=>getProjectTasks(p.id).forEach(t=>all.push({...t,_pid:p.id})));
  return all;
}
function getVisibleTasks(){
  const source = currentProjId==='all' ? getAllTasks() : getProjectTasks(currentProjId).map(t=>({...t,_pid:currentProjId}));
  const today=todayStr();
  switch(currentFilter){
    case 'active':  return source.filter(t=>!t.done);
    case 'done':    return source.filter(t=>t.done);
    case 'overdue': return source.filter(t=>!t.done&&t.deadline&&t.deadline<today);
    case 'today':   return source.filter(t=>!t.done&&t.deadline===today);
    default:        return source;
  }
}

// ─── FILTER / VIEW ───────────────────────────────────────
function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.filter-item').forEach(i=>i.classList.remove('active'));
  if(el)el.classList.add('active');
  const labels={active:'Actieve taken',done:'Afgeronde taken',overdue:'Verlopen taken',today:'Taken voor vandaag',all:'Alle taken'};
  document.getElementById('mainHeading').textContent=labels[f]||'Taken';
  render();
}
function setView(v,btn){
  currentView=v;
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  render();
}

// ─── TASK CRUD ───────────────────────────────────────────
function toggleDone(id,pid){
  const tasks=getProjectTasks(pid);
  const t=tasks.find(t=>t.id===id); if(!t)return;
  t.done=!t.done;
  t.doneAt=t.done?todayStr():null;
  saveTasks(pid,tasks);
  if(t.done)showToast(`✅ "${t.title}" afgerond!`);
  renderSidebar(); render();
}

function deleteTask(id,pid){
  const tasks=getProjectTasks(pid).filter(t=>t.id!==id);
  saveTasks(pid,tasks); renderSidebar(); render();
}

// ─── PROJECT MODAL ───────────────────────────────────────
function openProjModal(editId){
  closeProjDropdown();
  const isEdit=!!editId;
  document.getElementById('projModalTitle').textContent=isEdit?'Project bewerken':'Nieuw project';
  document.getElementById('projDeleteBtn').style.display=isEdit&&projects.length>1?'':'none';
  document.getElementById('projModal').dataset.editId=editId||'';
  const proj=isEdit?projects.find(p=>p.id===editId):null;
  document.getElementById('projName').value=proj?proj.name:'';
  const def=proj?proj.icon:PROJ_EMOJIS[0];
  document.getElementById('projEmojiGrid').innerHTML=PROJ_EMOJIS.map(e=>`<button class="emoji-btn ${e===def?'selected':''}" onclick="selectProjEmoji(this)">${e}</button>`).join('');
  document.getElementById('projModal').classList.add('open');
  setTimeout(()=>document.getElementById('projName').focus(),80);
}
function closeProjModal(){ document.getElementById('projModal').classList.remove('open'); }
function selectProjEmoji(btn){ document.querySelectorAll('#projEmojiGrid .emoji-btn').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); }
function getProjEmoji(){ const b=document.querySelector('#projEmojiGrid .emoji-btn.selected'); return b?b.textContent:PROJ_EMOJIS[0]; }

function saveProject(){
  const name=document.getElementById('projName').value.trim(); if(!name){showToast('Vul een naam in');return;}
  const icon=getProjEmoji();
  const editId=document.getElementById('projModal').dataset.editId;
  if(editId){
    const p=projects.find(p=>p.id===editId); if(p){p.name=name;p.icon=icon;}
    saveProjects(); updateProjHeader(); renderSidebar(); closeProjModal(); showToast('Project bijgewerkt');
  }else{
    const id='proj_'+Date.now();
    projects.push({id,name,icon}); saveProjects();
    closeProjModal(); switchProject(id); showToast(`"${name}" aangemaakt!`);
  }
}

function deleteCurrentProject(){
  const editId=document.getElementById('projModal').dataset.editId;
  if(!editId||projects.length<=1){showToast('Minimaal 1 project vereist');return;}
  if(!confirm(`Project "${projects.find(p=>p.id===editId)?.name}" verwijderen? Alle taken gaan verloren.`))return;
  localStorage.removeItem(tasksKey(editId));
  projects=projects.filter(p=>p.id!==editId); saveProjects();
  closeProjModal();
  switchProject(projects[0].id); showToast('Project verwijderd');
}

// ─── TASK MODAL ──────────────────────────────────────────
function buildProjOptions(val){
  document.getElementById('editProject').innerHTML=projects.map(p=>`<option value="${p.id}">${p.icon} ${escHtml(p.name)}</option>`).join('');
  if(val)document.getElementById('editProject').value=val;
}
function selectPriority(btn){ document.querySelectorAll('.prio-btn').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); }
function getSelectedPriority(){ const b=document.querySelector('.prio-btn.selected'); return b?b.dataset.prio:'none'; }

function openTaskModal(id, prefillProjId){
  editingTaskId=id||null;
  let task=null;
  if(id!=null){
    for(const p of projects){
      const t=getProjectTasks(p.id).find(t=>t.id===id);
      if(t){task={...t,_pid:p.id};break;}
    }
  }
  document.getElementById('taskModalTitle').textContent=task?'Taak bewerken':'Taak toevoegen';
  document.getElementById('taskDeleteBtn').style.display=task?'':'none';
  document.getElementById('doneToggleRow').style.display=task?'flex':'none';
  document.getElementById('editDone').checked=task?!!task.done:false;
  document.getElementById('editTitle').value=task?task.title:'';
  document.getElementById('editNotes').value=task?task.notes||'':'';
  document.getElementById('editDeadline').value=task?task.deadline||'':'';
  document.getElementById('editDeadlineTime').value=task?task.deadlineTime||'':'';
  // Priority buttons
  const prio=task?task.priority||'none':'none';
  document.querySelectorAll('.prio-btn').forEach(b=>{ b.classList.toggle('selected',b.dataset.prio===prio); });
  const defaultProj=prefillProjId||(currentProjId!=='all'?currentProjId:projects[0]?.id);
  buildProjOptions(task?task._pid:defaultProj);
  document.getElementById('taskModal').classList.add('open');
  setTimeout(()=>document.getElementById('editTitle').focus(),80);
}

function closeTaskModal(){ document.getElementById('taskModal').classList.remove('open'); editingTaskId=null; }

function saveTask(){
  const title=document.getElementById('editTitle').value.trim(); if(!title){showToast('Vul een titel in');return;}
  const pid=document.getElementById('editProject').value;
  const data={
    title,
    notes:document.getElementById('editNotes').value.trim(),
    deadline:document.getElementById('editDeadline').value,
    deadlineTime:document.getElementById('editDeadlineTime').value,
    priority:getSelectedPriority(),
    done:document.getElementById('editDone').checked,
  };

  if(editingTaskId!=null){
    // Find in which project
    let found=false;
    for(const p of projects){
      const tasks=getProjectTasks(p.id);
      const idx=tasks.findIndex(t=>t.id===editingTaskId);
      if(idx>=0){
        const wasDone=tasks[idx].done;
        const doneAt=tasks[idx].doneAt;
        // If moving to another project
        if(p.id!==pid){
          tasks.splice(idx,1); saveTasks(p.id,tasks);
          const newTasks=getProjectTasks(pid);
          newTasks.push({...tasks.find(()=>false)||{},id:editingTaskId,...data,doneAt:data.done&&!wasDone?todayStr():doneAt,createdAt:tasks[idx]?.createdAt||todayStr()});
          // Re-find since we spliced
          saveTasks(pid,[...getProjectTasks(pid),{id:editingTaskId,...data,doneAt:data.done&&!wasDone?todayStr():doneAt,createdAt:todayStr()}]);
        }else{
          Object.assign(tasks[idx],data);
          if(data.done&&!wasDone)tasks[idx].doneAt=todayStr();
          if(!data.done)tasks[idx].doneAt=null;
          saveTasks(p.id,tasks);
        }
        found=true; break;
      }
    }
    showToast('Taak bijgewerkt!');
  }else{
    const tasks=getProjectTasks(pid);
    tasks.push({id:Date.now()+Math.random(),...data,doneAt:data.done?todayStr():null,createdAt:todayStr()});
    saveTasks(pid,tasks);
    showToast(`"${title}" toegevoegd!`);
  }
  closeTaskModal(); renderSidebar(); render();
}

function deleteTaskFromModal(){
  if(editingTaskId==null)return;
  for(const p of projects){
    const tasks=getProjectTasks(p.id);
    const idx=tasks.findIndex(t=>t.id===editingTaskId);
    if(idx>=0){ tasks.splice(idx,1); saveTasks(p.id,tasks); break; }
  }
  showToast('Taak verwijderd'); closeTaskModal(); renderSidebar(); render();
}

// ─── RENDER ──────────────────────────────────────────────
function render(){
  const container=document.getElementById('taskContainer');
  const visible=getVisibleTasks();
  if(!visible.length){
    const msgs={active:'Geen open taken. Goed bezig!',done:'Geen afgeronde taken.',overdue:'Geen verlopen taken.',today:'Geen taken voor vandaag.',all:'Nog geen taken aangemaakt.'};
    container.innerHTML=`<div class="empty-state"><div class="empty-icon">${currentFilter==='done'?'🎉':'📋'}</div><p>${msgs[currentFilter]||'Geen taken gevonden.'}</p><button onclick="openTaskModal(null)">＋ Taak toevoegen</button></div>`;
    return;
  }
  if(currentView==='deadline') renderByDeadline(container,visible);
  else if(currentView==='priority') renderByPriority(container,visible);
  else renderByProject(container,visible);
}

function renderByDeadline(container,tasks){
  const groups={};
  DEADLINE_ORDER.forEach(k=>{groups[k]=[];});
  tasks.forEach(t=>groups[deadlineGroup(t.deadline)].push(t));
  // Sort within groups by priority then title
  Object.values(groups).forEach(g=>g.sort((a,b)=>(PRIO_ORDER[a.priority||'none']-PRIO_ORDER[b.priority||'none'])||a.title.localeCompare(b.title)));
  container.innerHTML=DEADLINE_ORDER.filter(k=>groups[k].length).map(k=>{
    const cfg=GROUP_CONFIG[k];
    return`<div class="group-section">
      <div class="group-header ${cfg.cls}">${cfg.icon} ${cfg.label}<span class="group-count">${groups[k].length}</span></div>
      ${groups[k].map(t=>taskHTML(t)).join('')}
    </div>`;
  }).join('');
}

function renderByPriority(container,tasks){
  const groups={high:[],medium:[],low:[],none:[]};
  tasks.forEach(t=>groups[t.priority||'none'].push(t));
  Object.values(groups).forEach(g=>g.sort((a,b)=>(a.deadline||'9').localeCompare(b.deadline||'9')||a.title.localeCompare(b.title)));
  container.innerHTML=Object.entries(groups).filter(([,g])=>g.length).map(([k,g])=>{
    const cfg=PRIO_GROUP_CONFIG[k];
    return`<div class="group-section">
      <div class="group-header ${cfg.cls}">${cfg.icon} ${cfg.label}<span class="group-count">${g.length}</span></div>
      ${g.map(t=>taskHTML(t)).join('')}
    </div>`;
  }).join('');
}

function renderByProject(container,tasks){
  container.innerHTML=projects.map(p=>{
    const g=tasks.filter(t=>t._pid===p.id);
    if(!g.length)return'';
    g.sort((a,b)=>(PRIO_ORDER[a.priority||'none']-PRIO_ORDER[b.priority||'none'])||(a.deadline||'9').localeCompare(b.deadline||'9'));
    return`<div class="group-section">
      <div class="group-header week">${p.icon} ${escHtml(p.name)}<span class="group-count">${g.length}</span></div>
      ${g.map(t=>taskHTML(t)).join('')}
    </div>`;
  }).join('');
}

function taskHTML(task){
  const pid=task._pid;
  const grp=deadlineGroup(task.deadline);
  const isOverdue=grp==='overdue'&&!task.done;
  const dlLabel=fmtDeadline(task.deadline,task.deadlineTime);
  const dlCls=task.done?'normal':grp==='overdue'?'overdue':grp==='today'?'today':grp==='tomorrow'?'tomorrow':'normal';
  const prioColor=PRIO_COLORS[task.priority||'none'];
  const proj=projects.find(p=>p.id===pid);
  const showProj=currentProjId==='all';
  return`<div class="task-card ${task.done?'done-card':''} ${isOverdue?'overdue-card':''}">
    <div class="task-check" onclick="event.stopPropagation();toggleDone(${task.id},'${pid}')">${task.done?'✓':''}</div>
    <div class="prio-strip" style="background:${prioColor}"></div>
    <div class="task-body" onclick="openTaskModal(${task.id})">
      <div class="task-title">${escHtml(task.title)}</div>
      <div class="task-meta">
        ${dlLabel?`<span class="deadline-badge ${dlCls}">📅 ${dlLabel}</span>`:''}
        ${showProj&&proj?`<span class="proj-badge">${proj.icon} ${escHtml(proj.name)}</span>`:''}
        ${task.priority&&task.priority!=='none'?`<span style="font-size:.68rem;color:${prioColor};font-weight:500">${task.priority==='high'?'↑':task.priority==='medium'?'→':'↓'} ${PRIO_LABELS[task.priority]}</span>`:''}
      </div>
      ${task.notes?`<div class="task-notes">${escHtml(task.notes.substring(0,80))}${task.notes.length>80?'…':''}</div>`:''}
    </div>
    <button class="task-del-btn" onclick="event.stopPropagation();deleteTask(${task.id},'${pid}')">🗑</button>
  </div>`;
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg){ const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800); }

// ─── KEYBOARD ────────────────────────────────────────────
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeTaskModal();closeProjModal();closeProjDropdown();} });

// ─── PWA ─────────────────────────────────────────────────
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js');

// ─── INIT ────────────────────────────────────────────────
updateProjHeader();
renderSidebar();
render();
</script>
</body>
</html>

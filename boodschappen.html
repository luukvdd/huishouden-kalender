<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boodschappenlijst</title>
<meta name="theme-color" content="#4A6B57">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Boodschappenlijst">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F5F0E8;--warm-white:#FDFAF5;
  --sage:#7C9E8A;--sage-light:#A8C4B4;--sage-dark:#4A6B57;
  --terracotta:#C4714A;--terracotta-light:#E8A882;
  --charcoal:#2C2C2C;--mid-gray:#6B6B6B;--light-gray:#E0DAD0;
  --shadow:rgba(44,44,44,.08);--shadow-md:rgba(44,44,44,.14);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--cream);color:var(--charcoal);min-height:100vh;}

/* ── HEADER ── */
header{background:var(--sage-dark);color:white;padding:12px 22px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px var(--shadow-md);position:sticky;top:0;z-index:50;gap:10px;flex-wrap:wrap;}
.header-left{display:flex;align-items:center;gap:10px;}
.header-left h1{font-family:'DM Serif Display',Georgia,serif;font-size:1.4rem;letter-spacing:-.01em;}
.header-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
.hdr-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:white;padding:6px 12px;border-radius:22px;cursor:pointer;font-family:inherit;font-size:.74rem;font-weight:500;transition:all .2s;display:flex;align-items:center;gap:5px;white-space:nowrap;text-decoration:none;}
.hdr-btn:hover{background:rgba(255,255,255,.28);}
.hdr-btn.primary{background:var(--terracotta);border-color:var(--terracotta);}
.hdr-btn.primary:hover{background:#b5623d;}

/* ── LIST SELECTOR ── */
.list-selector{position:relative;}
.list-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--warm-white);border-radius:12px;box-shadow:0 6px 24px rgba(44,44,44,.18);min-width:220px;z-index:300;padding:8px;display:none;}
.list-dropdown.open{display:block;}
.list-dd-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:.83rem;color:var(--charcoal);transition:background .15s;}
.list-dd-item:hover{background:var(--cream);}
.list-dd-item.current{font-weight:600;background:var(--cream);}
.list-divider{height:1px;background:var(--light-gray);margin:4px 0;}
.list-new-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:.83rem;color:var(--sage-dark);font-weight:500;border:none;background:none;width:100%;font-family:inherit;transition:background .15s;}
.list-new-btn:hover{background:var(--cream);}
.list-edit-btn{background:none;border:none;cursor:pointer;color:var(--mid-gray);font-size:.78rem;padding:2px 5px;border-radius:4px;opacity:.5;transition:opacity .1s;margin-left:auto;flex-shrink:0;}
.list-edit-btn:hover{opacity:1;}

/* ── LAYOUT ── */
.app{display:grid;grid-template-columns:250px 1fr;height:calc(100vh - 58px);}

/* ── SIDEBAR ── */
.sidebar{background:var(--warm-white);border-right:1px solid var(--light-gray);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px;}
.section-title{font-family:'DM Serif Display',Georgia,serif;font-size:.9rem;color:var(--sage-dark);margin-bottom:7px;}
.sidebar-list-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;cursor:pointer;font-size:.82rem;transition:background .15s;}
.sidebar-list-item:hover{background:var(--cream);}
.sidebar-list-item.active{background:var(--cream);font-weight:600;}
.sidebar-list-count{margin-left:auto;font-size:.68rem;color:var(--mid-gray);background:var(--light-gray);padding:1px 6px;border-radius:10px;flex-shrink:0;}
.sidebar-list-edit{background:none;border:none;cursor:pointer;color:var(--mid-gray);font-size:.75rem;padding:1px 4px;opacity:0;transition:opacity .1s;border-radius:3px;}
.sidebar-list-item:hover .sidebar-list-edit{opacity:.6;}
.sidebar-list-edit:hover{opacity:1!important;}
.sidebar-new-btn{background:none;border:1px dashed var(--light-gray);border-radius:7px;padding:7px;cursor:pointer;font-family:inherit;font-size:.8rem;color:var(--sage-dark);transition:all .15s;width:100%;text-align:center;}
.sidebar-new-btn:hover{background:var(--cream);border-color:var(--sage);}
.filter-toggle{display:flex;align-items:center;gap:8px;font-size:.82rem;cursor:pointer;padding:4px 0;user-select:none;}
.filter-toggle input{width:14px;height:14px;accent-color:var(--sage);cursor:pointer;}
.sidebar-action-btn{background:none;border:1px solid var(--light-gray);border-radius:7px;padding:7px 10px;cursor:pointer;font-family:inherit;font-size:.78rem;transition:all .15s;width:100%;text-align:left;}
.sidebar-action-btn.danger{color:var(--terracotta);}
.sidebar-action-btn.danger:hover{background:var(--terracotta);color:white;border-color:var(--terracotta);}
.sidebar-action-btn.safe{color:var(--sage-dark);}
.sidebar-action-btn.safe:hover{background:var(--sage-dark);color:white;border-color:var(--sage-dark);}
.progress-bar{background:var(--light-gray);border-radius:99px;height:6px;overflow:hidden;margin-top:6px;}
.progress-fill{background:var(--sage);height:100%;border-radius:99px;transition:width .3s;}
.progress-label{font-size:.7rem;color:var(--mid-gray);margin-top:4px;}

/* ── MAIN ── */
.main{overflow-y:auto;padding:20px 24px;}
.main-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:10px;flex-wrap:wrap;}
.main-title-wrap{display:flex;flex-direction:column;gap:2px;}
.main-title-wrap h2{font-family:'DM Serif Display',Georgia,serif;font-size:1.3rem;}
.main-store-label{font-size:.76rem;color:var(--mid-gray);}
.add-item-btn{background:var(--sage-dark);color:white;border:none;padding:7px 16px;border-radius:22px;cursor:pointer;font-family:inherit;font-size:.8rem;font-weight:600;transition:background .2s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.add-item-btn:hover{background:var(--sage);}

/* ── ITEMS ── */
.item-group{margin-bottom:18px;}
.item-group-header{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mid-gray);margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--light-gray);display:flex;align-items:center;gap:8px;}
.item-card{background:var(--warm-white);border-radius:9px;padding:11px 13px;margin-bottom:5px;display:flex;align-items:center;gap:11px;border:1px solid var(--light-gray);transition:box-shadow .15s;}
.item-card:hover{box-shadow:0 2px 8px var(--shadow);}
.item-card.checked{opacity:.45;}
.item-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--light-gray);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:white;transition:all .2s;cursor:pointer;}
.item-card.checked .item-check{background:var(--sage);border-color:var(--sage);}
.item-check:hover{border-color:var(--sage);}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.item-info{flex:1;min-width:0;cursor:pointer;}
.item-name{font-size:.86rem;font-weight:500;line-height:1.3;}
.item-card.checked .item-name{text-decoration:line-through;}
.item-meta{font-size:.72rem;color:var(--mid-gray);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.item-notes{font-size:.72rem;color:var(--mid-gray);font-style:italic;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.item-actions{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.item-link-btn{background:none;border:1px solid var(--light-gray);border-radius:6px;padding:4px 9px;cursor:pointer;font-size:.7rem;color:var(--sage-dark);transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;}
.item-link-btn:hover{background:var(--sage-dark);color:white;border-color:var(--sage-dark);}
.item-del-btn{background:none;border:none;color:var(--mid-gray);cursor:pointer;font-size:.9rem;padding:3px 5px;border-radius:4px;opacity:.3;transition:opacity .1s;}
.item-del-btn:hover{opacity:1;color:var(--terracotta);}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--mid-gray);}
.empty-state .empty-icon{font-size:3.5rem;margin-bottom:14px;}
.empty-state p{font-size:.9rem;line-height:1.6;margin-bottom:20px;}
.empty-state button{background:var(--sage-dark);color:white;border:none;padding:10px 22px;border-radius:22px;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:600;transition:background .2s;}
.empty-state button:hover{background:var(--sage);}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(44,44,44,.48);display:none;align-items:center;justify-content:center;z-index:200;padding:16px;}
.modal-overlay.open{display:flex;}
.modal-card{background:var(--warm-white);border-radius:16px;width:100%;max-width:470px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(44,44,44,.22);}
.modal-top{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 0;}
.modal-top h3{font-family:'DM Serif Display',Georgia,serif;font-size:1.1rem;}
.modal-close{background:var(--light-gray);border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;color:var(--mid-gray);transition:background .15s;flex-shrink:0;}
.modal-close:hover{background:var(--terracotta-light);}
.modal-body{padding:14px 18px;display:flex;flex-direction:column;gap:11px;}
.form-row{display:flex;flex-direction:column;gap:3px;}
.form-row label{font-size:.64rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--mid-gray);}
.form-row input,.form-row select,.form-row textarea{background:var(--cream);border:1px solid var(--light-gray);border-radius:7px;padding:8px 10px;font-family:inherit;font-size:.82rem;color:var(--charcoal);outline:none;transition:border-color .15s;}
.form-row textarea{min-height:54px;resize:vertical;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--sage);}
.form-row-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.url-preview{font-size:.72rem;color:var(--sage-dark);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.modal-footer{display:flex;gap:7px;padding:0 18px 16px;}
.btn-danger{background:none;border:1px solid var(--terracotta-light);color:var(--terracotta);padding:8px 12px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:600;transition:all .2s;}
.btn-danger:hover{background:var(--terracotta);color:white;}
.btn-save{flex:1;background:var(--sage-dark);color:white;border:none;padding:8px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;transition:background .2s;}
.btn-save:hover{background:var(--sage);}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-top:4px;}
.emoji-btn{background:none;border:2px solid transparent;border-radius:7px;padding:4px;cursor:pointer;font-size:1.2rem;transition:all .15s;text-align:center;}
.emoji-btn:hover{background:var(--cream);}
.emoji-btn.selected{border-color:var(--sage-dark);background:var(--cream);}

/* ── FAB ── */
.mobile-fab{display:none;position:fixed;bottom:20px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--sage-dark);color:white;border:none;font-size:1.7rem;cursor:pointer;box-shadow:0 4px 16px rgba(44,44,44,.24);z-index:100;align-items:center;justify-content:center;transition:background .2s;}
.mobile-fab:hover{background:var(--sage);}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;right:20px;background:var(--charcoal);color:white;padding:10px 16px;border-radius:10px;font-size:.8rem;opacity:0;transform:translateY(8px);transition:all .25s;z-index:999;max-width:290px;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0);}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--light-gray);border-radius:10px;}

@media(max-width:768px){
  .app{grid-template-columns:1fr;height:auto;}
  .sidebar{display:none;}
  .main{padding:12px;}
  .mobile-fab{display:flex;}
  #toast{bottom:82px;right:12px;}
  header{padding:10px 14px;}
  .header-left h1{font-size:1.1rem;}
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="index.html" class="hdr-btn">🏡 Thuis</a>
    <h1>🛒 Boodschappenlijst</h1>
  </div>
  <div class="header-right">
    <div class="list-selector" id="listSelector">
      <button class="hdr-btn" onclick="toggleListDropdown(event)">
        <span id="currentListIcon">🛒</span>
        <span id="currentListName">Laden…</span>
        <span>▾</span>
      </button>
      <div class="list-dropdown" id="listDropdown">
        <div id="listDropdownItems"></div>
        <div class="list-divider"></div>
        <button class="list-new-btn" onclick="openListModal(null)">＋ Nieuw lijstje</button>
      </div>
    </div>
    <button class="hdr-btn primary" onclick="openItemModal(null)">＋ Product</button>
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <div>
      <div class="section-title">Lijsten</div>
      <div id="sidebarLists"></div>
      <button class="sidebar-new-btn" onclick="openListModal(null)" style="margin-top:6px">＋ Nieuw lijstje</button>
    </div>
    <div>
      <div class="section-title">Voortgang</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-label" id="progressLabel">0 van 0 ingeslagen</div>
    </div>
    <div>
      <div class="section-title">Weergave</div>
      <label class="filter-toggle">
        <input type="checkbox" id="showChecked" checked onchange="renderItems()">
        Toon afgevinkte producten
      </label>
    </div>
    <div>
      <div class="section-title">Acties</div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <button class="sidebar-action-btn danger" onclick="clearCheckedItems()">🗑 Wis afgevinkte producten</button>
        <button class="sidebar-action-btn safe" onclick="uncheckAll()">↩ Alles opnieuw aanvinken</button>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <div class="main-title-wrap">
        <h2 id="mainListTitle">Boodschappen</h2>
        <div class="main-store-label" id="mainStoreLabel"></div>
      </div>
      <button class="add-item-btn" onclick="openItemModal(null)">＋ Product toevoegen</button>
    </div>
    <div id="itemsContainer"></div>
  </main>
</div>

<!-- ITEM MODAL -->
<div class="modal-overlay" id="itemModal" onclick="if(event.target===this)closeItemModal()">
  <div class="modal-card">
    <div class="modal-top">
      <h3 id="itemModalTitle">Product toevoegen</h3>
      <button class="modal-close" onclick="closeItemModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label>Naam *</label>
        <input type="text" id="editItemName" placeholder="bijv. Halfvolle melk"/>
      </div>
      <div class="form-row">
        <label>Merk</label>
        <input type="text" id="editItemBrand" placeholder="bijv. Campina"/>
      </div>
      <div class="form-row-grid">
        <div class="form-row">
          <label>Hoeveelheid</label>
          <input type="number" id="editItemQty" placeholder="1" min="0" step="0.1"/>
        </div>
        <div class="form-row">
          <label>Eenheid</label>
          <select id="editItemUnit">
            <option value="">—</option>
            <option value="stuks">stuks</option>
            <option value="gram">gram</option>
            <option value="kg">kg</option>
            <option value="ml">ml</option>
            <option value="liter">liter</option>
            <option value="pak">pak</option>
            <option value="fles">fles</option>
            <option value="blik">blik</option>
            <option value="zak">zak</option>
            <option value="doos">doos</option>
            <option value="rol">rol</option>
            <option value="tube">tube</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label>Categorie</label>
        <select id="editItemCat"></select>
      </div>
      <div class="form-row">
        <label>Notities</label>
        <textarea id="editItemNotes" placeholder="bijv. Biologisch, let op formaat…"></textarea>
      </div>
      <div class="form-row">
        <label>URL webwinkel</label>
        <input type="url" id="editItemUrl" placeholder="https://www.ah.nl/producten/…" oninput="updateUrlPreview()"/>
        <div class="url-preview" id="urlPreview"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-danger" id="itemDeleteBtn" onclick="deleteItemFromModal()" style="display:none">Verwijderen</button>
      <button class="btn-save" onclick="saveItem()">Opslaan</button>
    </div>
  </div>
</div>

<!-- LIST MODAL -->
<div class="modal-overlay" id="listModal" onclick="if(event.target===this)closeListModal()">
  <div class="modal-card">
    <div class="modal-top">
      <h3 id="listModalTitle">Nieuw lijstje</h3>
      <button class="modal-close" onclick="closeListModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label>Naam *</label>
        <input type="text" id="listName" placeholder="bijv. Weekboodschappen"/>
      </div>
      <div class="form-row">
        <label>Winkel</label>
        <input type="text" id="listStore" placeholder="bijv. Albert Heijn, Jumbo…"/>
      </div>
      <div class="form-row">
        <label>Icoon</label>
        <div class="emoji-grid" id="listEmojiGrid"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-danger" id="listDeleteBtn" onclick="deleteCurrentList()" style="display:none">Verwijderen</button>
      <button class="btn-save" onclick="saveList()">Opslaan</button>
    </div>
  </div>
</div>

<button class="mobile-fab" onclick="openItemModal(null)" title="Product toevoegen">+</button>
<div id="toast"></div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────
const SHOP_CATS = {
  groente:    { label:'Groente & Fruit',          emoji:'🥦', color:'#5A8A4A' },
  zuivel:     { label:'Zuivel & Eieren',           emoji:'🥛', color:'#5B7FA6' },
  vlees:      { label:'Vlees, Vis & Vega',         emoji:'🥩', color:'#C4714A' },
  brood:      { label:'Brood & Bakkerij',          emoji:'🍞', color:'#A08060' },
  droog:      { label:'Droog & Conserven',         emoji:'🥫', color:'#8A6FA0' },
  dranken:    { label:'Dranken',                   emoji:'🧃', color:'#4A7EA0' },
  diepvries:  { label:'Diepvries',                 emoji:'❄️', color:'#6A9EC0' },
  verzorging: { label:'Persoonlijke Verzorging',   emoji:'🧴', color:'#C47A8A' },
  schoonmaak: { label:'Schoonmaakmiddelen',        emoji:'🧽', color:'#7C9E8A' },
  overig:     { label:'Overig',                    emoji:'📦', color:'#999999' },
};
const CAT_ORDER = Object.keys(SHOP_CATS);
const LIST_EMOJIS = ['🛒','🏪','🧺','📝','🍽️','🌿','⭐','❤️','🏡','🎯','🌸','☀️','🍎','🥗','🧀','🐟'];

// ─── STATE ───────────────────────────────────────────────
let lists = JSON.parse(localStorage.getItem('bs_lists') || 'null');
if(!lists){ lists=[{id:'default',name:'Weekboodschappen',store:'',icon:'🛒'}]; localStorage.setItem('bs_lists',JSON.stringify(lists)); }
let currentListId = localStorage.getItem('bs_current') || 'default';
if(!lists.find(l=>l.id===currentListId)) currentListId = lists[0].id;

function itemsKey(id){ return `bs_items_${id}`; }
function loadItems(id){ return JSON.parse(localStorage.getItem(itemsKey(id))||'[]'); }
function saveItems(){ localStorage.setItem(itemsKey(currentListId),JSON.stringify(items)); }
function saveLists(){ localStorage.setItem('bs_lists',JSON.stringify(lists)); }

let items = loadItems(currentListId);
let editingItemId = null;

// ─── LIST DROPDOWN ───────────────────────────────────────
function toggleListDropdown(e){ e&&e.stopPropagation(); const dd=document.getElementById('listDropdown'); dd.classList.toggle('open'); if(dd.classList.contains('open'))renderListDropdown(); }
function closeListDropdown(){ document.getElementById('listDropdown').classList.remove('open'); }
document.addEventListener('click',e=>{ if(!document.getElementById('listSelector').contains(e.target))closeListDropdown(); });

function renderListDropdown(){
  document.getElementById('listDropdownItems').innerHTML=lists.map(l=>{
    const cnt=loadItems(l.id).filter(i=>!i.checked).length;
    return`<div class="list-dd-item ${l.id===currentListId?'current':''}" onclick="switchList('${l.id}')">
      <span>${l.icon}</span>
      <span style="flex:1">${l.name}${l.store?' · <span style="opacity:.6;font-size:.78rem">'+l.store+'</span>':''}</span>
      ${cnt>0?`<span style="background:var(--light-gray);padding:1px 6px;border-radius:10px;font-size:.68rem">${cnt}</span>`:''}
      <button class="list-edit-btn" onclick="event.stopPropagation();closeListDropdown();openListModal('${l.id}')">✎</button>
    </div>`;
  }).join('');
}

function switchList(id){
  saveItems(); currentListId=id; localStorage.setItem('bs_current',id); items=loadItems(id);
  closeListDropdown(); updateListHeader(); renderSidebar(); renderItems();
}

function updateListHeader(){
  const list=lists.find(l=>l.id===currentListId)||lists[0];
  document.getElementById('currentListIcon').textContent=list.icon;
  document.getElementById('currentListName').textContent=list.name;
  document.getElementById('mainListTitle').textContent=`${list.icon} ${list.name}`;
  document.getElementById('mainStoreLabel').textContent=list.store?`📍 ${list.store}`:'';
}

// ─── SIDEBAR ─────────────────────────────────────────────
function renderSidebar(){
  document.getElementById('sidebarLists').innerHTML=lists.map(l=>{
    const its=loadItems(l.id);
    const cnt=its.filter(i=>!i.checked).length;
    return`<div class="sidebar-list-item ${l.id===currentListId?'active':''}" onclick="switchList('${l.id}')">
      <span>${l.icon}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.name}</span>
      ${cnt>0?`<span class="sidebar-list-count">${cnt}</span>`:''}
      <button class="sidebar-list-edit" onclick="event.stopPropagation();openListModal('${l.id}')">✎</button>
    </div>`;
  }).join('');
  renderProgress();
}

function renderProgress(){
  const total=items.length, done=items.filter(i=>i.checked).length;
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=`${done} van ${total} ingeslagen`;
}

// ─── LIST MODAL ──────────────────────────────────────────
function openListModal(editId){
  closeListDropdown();
  const isEdit=!!editId;
  document.getElementById('listModalTitle').textContent=isEdit?'Lijstje bewerken':'Nieuw lijstje';
  document.getElementById('listDeleteBtn').style.display=isEdit&&lists.length>1?'':'none';
  document.getElementById('listModal').dataset.editId=editId||'';
  const list=isEdit?lists.find(l=>l.id===editId):null;
  document.getElementById('listName').value=list?list.name:'';
  document.getElementById('listStore').value=list?list.store||'':'';
  const defaultIcon=list?list.icon:LIST_EMOJIS[0];
  document.getElementById('listEmojiGrid').innerHTML=LIST_EMOJIS.map(e=>`<button class="emoji-btn ${e===defaultIcon?'selected':''}" onclick="selectListEmoji(this)">${e}</button>`).join('');
  document.getElementById('listModal').classList.add('open');
  setTimeout(()=>document.getElementById('listName').focus(),80);
}
function closeListModal(){ document.getElementById('listModal').classList.remove('open'); }
function selectListEmoji(btn){ document.querySelectorAll('#listEmojiGrid .emoji-btn').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); }
function getListEmoji(){ const b=document.querySelector('#listEmojiGrid .emoji-btn.selected'); return b?b.textContent:LIST_EMOJIS[0]; }

function saveList(){
  const name=document.getElementById('listName').value.trim(); if(!name){showToast('Vul een naam in');return;}
  const store=document.getElementById('listStore').value.trim();
  const icon=getListEmoji();
  const editId=document.getElementById('listModal').dataset.editId;
  if(editId){
    const l=lists.find(l=>l.id===editId); if(l){l.name=name;l.store=store;l.icon=icon;}
    saveLists(); updateListHeader(); renderSidebar(); closeListModal(); showToast('Lijstje bijgewerkt');
  }else{
    const id='list_'+Date.now();
    lists.push({id,name,store,icon}); saveLists();
    closeListModal(); switchList(id); showToast(`"${name}" aangemaakt!`);
  }
}

function deleteCurrentList(){
  const editId=document.getElementById('listModal').dataset.editId;
  if(!editId||lists.length<=1){showToast('Minimaal 1 lijst vereist');return;}
  if(!confirm(`Lijstje verwijderen? Alle producten worden verwijderd.`))return;
  localStorage.removeItem(itemsKey(editId));
  lists=lists.filter(l=>l.id!==editId); saveLists();
  closeListModal();
  const next=lists[0].id; switchList(next);
  showToast('Lijstje verwijderd');
}

// ─── ITEM ACTIONS ────────────────────────────────────────
function toggleCheck(id){
  const item=items.find(i=>i.id===id); if(!item)return;
  item.checked=!item.checked;
  saveItems(); renderItems(); renderSidebar();
}

function clearCheckedItems(){
  const count=items.filter(i=>i.checked).length;
  if(!count){showToast('Geen afgevinkte producten');return;}
  if(!confirm(`${count} afgevinkt${count>1?'e producten':'  product'} verwijderen?`))return;
  items=items.filter(i=>!i.checked); saveItems(); renderItems(); renderSidebar();
  showToast(`${count} ${count>1?'producten':'product'} verwijderd`);
}

function uncheckAll(){
  if(!items.some(i=>i.checked)){showToast('Niets afgevinkt');return;}
  items.forEach(i=>i.checked=false); saveItems(); renderItems(); renderSidebar();
  showToast('Alles opnieuw aangevinkt');
}

function deleteItem(id){
  const item=items.find(i=>i.id===id); if(!item)return;
  items=items.filter(i=>i.id!==id); saveItems(); renderItems(); renderSidebar();
  showToast(`"${item.name}" verwijderd`);
}

// ─── ITEM MODAL ──────────────────────────────────────────
function buildCatOptions(val){
  document.getElementById('editItemCat').innerHTML=Object.entries(SHOP_CATS).map(([k,c])=>`<option value="${k}">${c.emoji} ${c.label}</option>`).join('');
  if(val)document.getElementById('editItemCat').value=val;
}

function openItemModal(id){
  editingItemId=id||null;
  const item=id!=null?items.find(i=>i.id===id):null;
  document.getElementById('itemModalTitle').textContent=item?'Product bewerken':'Product toevoegen';
  document.getElementById('itemDeleteBtn').style.display=item?'':'none';
  document.getElementById('editItemName').value=item?item.name:'';
  document.getElementById('editItemBrand').value=item?item.brand||'':'';
  document.getElementById('editItemQty').value=item?item.quantity||'':'';
  document.getElementById('editItemUnit').value=item?item.unit||'stuks':'stuks';
  buildCatOptions(item?item.category:'overig');
  document.getElementById('editItemNotes').value=item?item.notes||'':'';
  document.getElementById('editItemUrl').value=item?item.url||'':'';
  updateUrlPreview();
  document.getElementById('itemModal').classList.add('open');
  setTimeout(()=>document.getElementById('editItemName').focus(),80);
}
function closeItemModal(){ document.getElementById('itemModal').classList.remove('open'); editingItemId=null; }

function updateUrlPreview(){
  const url=document.getElementById('editItemUrl').value.trim();
  const prev=document.getElementById('urlPreview');
  if(url){ try{ prev.textContent='🔗 '+new URL(url).hostname; }catch{ prev.textContent='🔗 '+url.substring(0,50); } }
  else prev.textContent='';
}

function saveItem(){
  const name=document.getElementById('editItemName').value.trim(); if(!name){showToast('Vul een naam in');return;}
  const data={
    name,
    brand:document.getElementById('editItemBrand').value.trim(),
    quantity:document.getElementById('editItemQty').value.trim(),
    unit:document.getElementById('editItemUnit').value,
    category:document.getElementById('editItemCat').value,
    notes:document.getElementById('editItemNotes').value.trim(),
    url:document.getElementById('editItemUrl').value.trim(),
  };
  if(editingItemId!=null){
    const item=items.find(i=>i.id===editingItemId); if(item)Object.assign(item,data);
    showToast('Product bijgewerkt!');
  }else{
    items.push({id:Date.now()+Math.random(),checked:false,...data});
    showToast(`"${name}" toegevoegd!`);
  }
  saveItems(); closeItemModal(); renderItems(); renderSidebar();
}

function deleteItemFromModal(){
  if(editingItemId==null)return;
  deleteItem(editingItemId); closeItemModal();
}

// ─── RENDER ──────────────────────────────────────────────
function renderItems(){
  const container=document.getElementById('itemsContainer');
  const showChecked=document.getElementById('showChecked').checked;
  const visible=showChecked?items:items.filter(i=>!i.checked);

  if(!visible.length){
    if(items.length===0){
      container.innerHTML=`<div class="empty-state">
        <div class="empty-icon">🛒</div>
        <p>De lijst is nog leeg.<br>Voeg je eerste product toe!</p>
        <button onclick="openItemModal(null)">＋ Product toevoegen</button>
      </div>`;
    }else{
      container.innerHTML=`<div class="empty-state">
        <div class="empty-icon">✅</div>
        <p>Alle producten zijn ingeslagen!</p>
        <button onclick="uncheckAll()">↩ Opnieuw beginnen</button>
      </div>`;
    }
    return;
  }

  // Group by category in defined order
  const groups={};
  CAT_ORDER.forEach(k=>{groups[k]=[];});
  visible.forEach(item=>{
    const k=item.category||'overig';
    if(groups[k])groups[k].push(item);
    else groups['overig'].push(item);
  });

  container.innerHTML=CAT_ORDER.filter(k=>groups[k].length).map(k=>{
    const cat=SHOP_CATS[k];
    const g=groups[k];
    const leftInGroup=g.filter(i=>!i.checked).length;
    return`<div class="item-group">
      <div class="item-group-header">
        <span style="color:${cat.color}">${cat.emoji} ${cat.label}</span>
        <span style="background:var(--light-gray);padding:1px 7px;border-radius:10px;">${leftInGroup}/${g.length}</span>
      </div>
      ${g.map(item=>itemHTML(item)).join('')}
    </div>`;
  }).join('');

  renderProgress();
}

function itemHTML(item){
  const cat=SHOP_CATS[item.category]||SHOP_CATS.overig;
  const parts=[];
  if(item.brand)parts.push(item.brand);
  if(item.quantity)parts.push(item.quantity+(item.unit?' '+item.unit:''));
  const meta=parts.join(' · ');
  const linkBtn=item.url?`<a class="item-link-btn" href="${escHtml(item.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="${escHtml(item.url)}">🔗 Winkel</a>`:'';
  return`<div class="item-card ${item.checked?'checked':''}">
    <div class="item-check" onclick="toggleCheck(${item.id})">${item.checked?'✓':''}</div>
    <span class="cat-dot" style="background:${cat.color}"></span>
    <div class="item-info" onclick="openItemModal(${item.id})">
      <div class="item-name">${escHtml(item.name)}</div>
      ${meta?`<div class="item-meta">${escHtml(meta)}</div>`:''}
      ${item.notes?`<div class="item-notes">${escHtml(item.notes)}</div>`:''}
    </div>
    <div class="item-actions">
      ${linkBtn}
      <button class="item-del-btn" onclick="event.stopPropagation();deleteItem(${item.id})">🗑</button>
    </div>
  </div>`;
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg){ const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800); }

// ─── KEYBOARD ────────────────────────────────────────────
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeItemModal();closeListModal();closeListDropdown();} });

// ─── PWA ─────────────────────────────────────────────────
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js');

// ─── INIT ────────────────────────────────────────────────
updateListHeader();
renderSidebar();
renderItems();
</script>
</body>
</html>
